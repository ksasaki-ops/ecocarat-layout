  var REMEMBER_MS=7*24*60*60*1000;
  function b64d(s){ return Uint8Array.from(atob(s), function(c){return c.charCodeAt(0);}); }
  function ab2b64(buf){ var b=new Uint8Array(buf),s=''; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function $(id){ return document.getElementById(id); }
  function showApp(html){ var f=$('frame'); f.srcdoc=html; $('gate').style.display='none'; f.style.display='block'; }
  function showGate(){ $('gate').style.display='flex'; setTimeout(function(){ try{$('pw').focus();}catch(e){} },50); }
  async function decryptWithKey(key){
    var pt=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(IV) }, key, b64d(CT));
    return new TextDecoder().decode(pt);
  }
  async function unlock(){
    var pw=$('pw').value, msg=$('msg');
    if(!pw){ return; }
    msg.style.color='#7d8aa3'; msg.textContent='開いています…';
    try{
      var baseKey=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      var key=await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt:b64d(SALT), iterations:ITER, hash:'SHA-256' },
        baseKey, { name:'AES-GCM', length:256 }, true, ['decrypt']);   // extractable: 保存のため
      var html=await decryptWithKey(key);
      // 成功 → 復号鍵を期限付き保存(しばらくパスワード不要)。平文PWは保存しない。
      try{ var raw=await crypto.subtle.exportKey('raw', key);
        localStorage.setItem('eco_k', ab2b64(raw));
        localStorage.setItem('eco_exp', String(Date.now()+REMEMBER_MS)); }catch(e){}
      showApp(html);
    }catch(err){
      msg.style.color='#ff6b6b'; msg.textContent='パスワードが違います'; $('pw').select();
    }
  }
  // 起動時: 保存済みの鍵が有効ならパスワードなしで自動オープン
  async function tryRemembered(){
    try{
      var k=localStorage.getItem('eco_k'), exp=+localStorage.getItem('eco_exp')||0;
      if(!k || Date.now()>=exp) return false;
      var key=await crypto.subtle.importKey('raw', b64d(k), { name:'AES-GCM' }, false, ['decrypt']);
      var html=await decryptWithKey(key);
      showApp(html); return true;
    }catch(e){
      try{ localStorage.removeItem('eco_k'); localStorage.removeItem('eco_exp'); }catch(_){}
      return false;
    }
  }
  $('go').addEventListener('click', unlock);
  $('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') unlock(); });
  tryRemembered().then(function(ok){ if(!ok) showGate(); });
</script>
